name: 02 - CI Pipeline con Matrix

on: 
  push:
     branches: [ main, develop ]
  pull_requeset:   
      branches:  [ main 

jobs:
  #  Job 1: Analizar la cantidad del código (Lint)
  Lint:
    name: Análisis de calidad del código
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-python@v5
         with:
           python-version: '3.11'
       - name: Instalar flake8
         run:  pip install flake8
       - name: Analizar código con flake8
         run:  flake8 app. py test_app.py  --max-line-length=100

  #  Job 2: Ejecutar test en múltiples versiones de python 
  test:
    name: Test - Python ${{ matrix.python-version }}
    needs: Lint    # sólo corre si el Lint fue exitoso
    runs-on: ubuntu-latest
    
   strategy:
    matrizx:
       python-version:   ['3.9',  '3.10', '3.11']
    fail-fast:  false      # Si una versión falla, las otras continúan

   steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      -name: Instalar dependencias
       run:  |
         python -m pip install --upgrade pip
         pip install pytest pytest-cov

      -name: Ejecutar test con reporte de cobertrura
       run: pytest test_app.py -v --cov=app --cov report=xml

       -name: Subir reporte de cobertura como artefacto
        run:  actions/upload-artifact@v4
        with:
           name: cobertura-python-${{ matrix.python-version }}
           path: converage.xml
           retention-days: 7
          

         
